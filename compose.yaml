name: amg-land

services:
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: amg-land-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-amg_land}:${POSTGRES_PASSWORD:-amg_land_password}@postgres:5432/${POSTGRES_DB:-amg_land}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: amg-land-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-amg_land}:${POSTGRES_PASSWORD:-amg_land_password}@postgres:5432/${POSTGRES_DB:-amg_land}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000/amg-land-media}
      MINIO_BUCKET: ${MINIO_BUCKET:-amg-land-media}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-amgminio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-amgminio123}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: amg-land-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amg_land}
      POSTGRES_USER: ${POSTGRES_USER:-amg_land}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amg_land_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: amg-land-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-amgminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-amgminio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: amg-land-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-amgminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-amgminio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-amg-land-media}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set download local/$${MINIO_BUCKET};
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
